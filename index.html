<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title-tag">加载中...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', 'PingFang SC', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="#/" id="site-title" class="text-xl font-bold tracking-tight text-indigo-600"></a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="#/" class="text-slate-600 hover:text-indigo-600 px-3 py-2 text-sm font-medium">首页</a>
                        <a href="#/category/digital" class="text-slate-600 hover:text-indigo-600 px-3 py-2 text-sm font-medium">业务</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="main-view" class="min-h-screen pt-16">
        <!-- Views will be injected here -->
    </main>

    <!-- Contact Section (Footer) -->
    <section id="contact" class="py-24 bg-slate-900 text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h2 id="contact-title" class="text-3xl font-bold mb-12"></h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12 max-w-4xl mx-auto mb-16">
                <div>
                    <h4 class="text-indigo-400 font-semibold mb-2">邮件</h4>
                    <p id="contact-email"></p>
                </div>
                <div>
                    <h4 class="text-indigo-400 font-semibold mb-2">电话</h4>
                    <p id="contact-phone"></p>
                </div>
                <div>
                    <h4 class="text-indigo-400 font-semibold mb-2">地址</h4>
                    <p id="contact-address"></p>
                </div>
            </div>
            <div class="pt-8 border-t border-slate-800 text-slate-500 text-sm">
                <p id="contact-copyright"></p>
            </div>
        </div>
    </section>

    <script>
        let siteData = null;

        async function init() {
            try {
                const response = await fetch('./data/content.json');
                siteData = await response.json();
                
                // Static elements
                document.title = siteData.site.title;
                document.getElementById('site-title').textContent = siteData.site.title;
                
                // Contact Info
                document.getElementById('contact-title').textContent = siteData.contact.title;
                document.getElementById('contact-email').textContent = siteData.contact.email;
                document.getElementById('contact-phone').textContent = siteData.contact.phone;
                document.getElementById('contact-address').textContent = siteData.contact.address;
                document.getElementById('contact-copyright').textContent = siteData.contact.copyright;

                // Handle routing
                window.addEventListener('hashchange', router);
                router();

            } catch (error) {
                console.error('Initialization error:', error);
            }
        }

        function router() {
            const hash = window.location.hash || '#/';
            const mainView = document.getElementById('main-view');
            mainView.innerHTML = ''; // Clear previous view

            if (hash === '#/' || hash === '') {
                renderHome(mainView);
            } else if (hash.startsWith('#/category/')) {
                const catId = hash.replace('#/category/', '');
                renderCategory(mainView, catId);
            } else if (hash.startsWith('#/item/')) {
                const itemId = hash.replace('#/item/', '');
                renderItem(mainView, itemId);
            } else {
                renderHome(mainView); // Fallback
            }
            window.scrollTo(0, 0);
        }

        function renderHome(container) {
            const section = document.createElement('div');
            section.className = 'fade-in';
            section.innerHTML = `
                <!-- Hero -->
                <section class="relative pt-24 pb-20 lg:pt-32 lg:pb-32 overflow-hidden">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                        <div class="text-center lg:text-left lg:max-w-2xl">
                            <h1 class="text-4xl font-extrabold tracking-tight sm:text-6xl text-slate-900 mb-6">${siteData.hero.title}</h1>
                            <p class="text-xl text-slate-600 mb-10 leading-relaxed">${siteData.hero.subtitle}</p>
                            <a href="${siteData.hero.ctaLink}" class="inline-flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-lg">${siteData.hero.ctaText}</a>
                        </div>
                    </div>
                </section>

                <!-- About -->
                <section class="py-24 bg-white">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                        <h2 class="text-3xl font-bold text-slate-900 mb-8">${siteData.about.title}</h2>
                        <p class="text-lg text-slate-600 leading-loose max-w-3xl mx-auto">${siteData.about.description}</p>
                    </div>
                </section>

                <!-- Categories -->
                <section class="py-24 bg-slate-50">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="text-center mb-16">
                            <h2 class="text-3xl font-bold text-slate-900">核心业务分类</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                            ${siteData.categories.map(cat => `
                                <a href="#/category/${cat.id}" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 hover:shadow-lg transition-all transform hover:-translate-y-1 block">
                                    <div class="text-4xl mb-6">${cat.icon}</div>
                                    <h3 class="text-xl font-bold mb-4 text-slate-900">${cat.name}</h3>
                                    <p class="text-slate-600">点击查看该分类下的所有服务项目与案例。</p>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                </section>
            `;
            container.appendChild(section);
        }

        function renderCategory(container, catId) {
            const category = siteData.categories.find(c => c.id === catId);
            if (!category) {
                container.innerHTML = `<div class="p-20 text-center">分类未找到</div>`;
                return;
            }

            const section = document.createElement('div');
            section.className = 'fade-in py-24';
            section.innerHTML = `
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <nav class="mb-8 text-sm text-slate-500">
                        <a href="#/" class="hover:text-indigo-600">首页</a> / <span>${category.name}</span>
                    </nav>
                    <div class="mb-16">
                        <h1 class="text-4xl font-bold text-slate-900 mb-4">${category.icon} ${category.name}</h1>
                        <p class="text-xl text-slate-600">探索我们在${category.name}领域的专业解决方案。</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                        ${category.items.map(item => `
                            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100 flex flex-col">
                                <img src="${item.image}" alt="${item.name}" class="w-full h-64 object-cover">
                                <div class="p-8">
                                    <h3 class="text-2xl font-bold mb-4">${item.name}</h3>
                                    <p class="text-slate-600 mb-8">${item.summary}</p>
                                    <a href="#/item/${item.id}" class="inline-flex items-center text-indigo-600 font-semibold hover:text-indigo-700">
                                        查看详情 <svg class="ml-2 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                                    </a>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            container.appendChild(section);
        }

        function renderItem(container, itemId) {
            let item = null;
            let category = null;
            siteData.categories.forEach(cat => {
                const found = cat.items.find(i => i.id === itemId);
                if (found) {
                    item = found;
                    category = cat;
                }
            });

            if (!item) {
                container.innerHTML = `<div class="p-20 text-center">项目未找到</div>`;
                return;
            }

            const section = document.createElement('div');
            section.className = 'fade-in py-24';
            section.innerHTML = `
                <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                    <nav class="mb-8 text-sm text-slate-500">
                        <a href="#/" class="hover:text-indigo-600">首页</a> / 
                        <a href="#/category/${category.id}" class="hover:text-indigo-600">${category.name}</a> / 
                        <span>${item.name}</span>
                    </nav>
                    <img src="${item.image}" alt="${item.name}" class="w-full h-[400px] object-cover rounded-3xl shadow-xl mb-12">
                    <h1 class="text-4xl font-extrabold text-slate-900 mb-6">${item.name}</h1>
                    <div class="prose prose-indigo prose-lg max-w-none text-slate-600 mb-12">
                        ${item.full_details}
                    </div>
                    <div class="bg-indigo-50 p-8 rounded-2xl border border-indigo-100">
                        <h4 class="text-indigo-900 font-bold mb-2">对该项目感兴趣？</h4>
                        <p class="text-indigo-700 mb-6">点击下方按钮直接咨询我们的专业顾问。</p>
                        <a href="#contact" class="inline-flex items-center justify-center px-6 py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors">立即联系</a>
                    </div>
                </div>
            `;
            container.appendChild(section);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
