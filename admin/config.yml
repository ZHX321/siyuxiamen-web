backend:
  name: github
  repo: ZHX321/siyuxiamen-web
  branch: main
  base_url: https://www.siyuxiamen.cn
  auth_endpoint: api/auth

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - label: "Home Content"
        name: "home"
        file: "data/content.json"
        fields:
          - label: "Site"
            name: "site"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Favicon URL"
                name: "favicon"
                widget: "string"
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Subtitle"
                name: "subtitle"
                widget: "markdown"
              - label: "CTA Text"
                name: "ctaText"
                widget: "string"
              - label: "CTA Link"
                name: "ctaLink"
                widget: "string"
          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "markdown"
          - label: "Categories"
            name: "categories"
            widget: "list"
            fields:
              - label: "Category ID (URL safe)"
                name: "id"
                widget: "string"
              - label: "Category Name"
                name: "name"
                widget: "string"
              - label: "Icon"
                name: "icon"
                widget: "string"
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - label: "Item ID (URL safe)"
                    name: "id"
                    widget: "string"
                  - label: "Item Name"
                    name: "name"
                    widget: "string"
                  - label: "Summary"
                    name: "summary"
                    widget: "markdown"
                  - label: "Image URL"
                    name: "image"
                    widget: "image"
                  - label: "Full Details (HTML/Markdown)"
                    name: "full_details"
                    widget: "markdown"
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Email"
                name: "email"
                widget: "string"
              - label: "Phone"
                name: "phone"
                widget: "string"
              - label: "Address"
                name: "address"
                widget: "string"
              - label: "Copyright"
                name: "copyright"
                widget: "string"
: "string"
