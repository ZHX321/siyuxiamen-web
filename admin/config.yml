backend:
  name: github
  repo: ZHX321/siyuxiamen-web
  branch: main
  base_url: https://www.siyuxiamen.cn
  auth_endpoint: api/auth

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - label: "Home Content"
        name: "home"
        file: "data/content.json"
        fields:
          - label: "Site"
            name: "site"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Favicon URL"
                name: "favicon"
                widget: "string"
          - label: "Page Sections"
            name: "sections"
            widget: "list"
            types:
              - label: "Hero"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "subtitle", widget: "markdown" }
                  - { label: "CTA Text", name: "ctaText", widget: "string" }
                  - { label: "CTA Link", name: "ctaLink", widget: "string" }
                  - { label: "Background Image", name: "backgroundImage", widget: "image" }
              - label: "Services"
                name: "services"
                widget: "object"
                fields:
                  - { label: "Section Title", name: "title", widget: "string" }
                  - label: "Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Icon", name: "icon", widget: "string" }
                      - { label: "Name", name: "name", widget: "string" }
                      - { label: "Summary", name: "summary", widget: "markdown" }
              - label: "Pricing"
                name: "pricing"
                widget: "object"
                fields:
                  - { label: "Section Title", name: "title", widget: "string" }
                  - label: "Plans"
                    name: "plans"
                    widget: "list"
                    fields:
                      - { label: "Name", name: "name", widget: "string" }
                      - { label: "Price", name: "price", widget: "string" }
                      - { label: "Features (Comma separated)", name: "features", widget: "string" }
                      - { label: "Button Text", name: "buttonText", widget: "string" }
                      - { label: "Button Link", name: "buttonLink", widget: "string" }
              - label: "Gallery"
                name: "gallery"
                widget: "object"
                fields:
                  - { label: "Section Title", name: "title", widget: "string" }
                  - { label: "Images", name: "images", widget: "list", field: { label: "Image", name: "image", widget: "image" } }
              - label: "Contact"
                name: "contact"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "markdown" }
                  - { label: "Show Form", name: "showForm", widget: "boolean" }
                  - { label: "Map Embed Code", name: "mapEmbed", widget: "text" }
          
          - label: "Recursive Pages (Unlimited Depth Support)"
            name: "pages"
            widget: "list"
            fields: &page_fields
              - { label: "Page ID (URL safe)", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Type", name: "type", widget: "select", options: ["list", "detail"], default: "list" }
              - { label: "Icon", name: "icon", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Summary", name: "summary", widget: "markdown", required: false }
              - { label: "Content (For detail pages)", name: "content", widget: "markdown", required: false }
              - label: "Children (L2)"
                name: "children"
                widget: "list"
                required: false
                fields:
                  - { label: "Page ID (URL safe)", name: "id", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Type", name: "type", widget: "select", options: ["list", "detail"], default: "list" }
                  - { label: "Icon", name: "icon", widget: "string", required: false }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Summary", name: "summary", widget: "markdown", required: false }
                  - { label: "Content (For detail pages)", name: "content", widget: "markdown", required: false }
                  - label: "Children (L3)"
                    name: "children"
                    widget: "list"
                    required: false
                    fields:
                      - { label: "Page ID (URL safe)", name: "id", widget: "string" }
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Type", name: "type", widget: "select", options: ["list", "detail"], default: "list" }
                      - { label: "Icon", name: "icon", widget: "string", required: false }
                      - { label: "Image", name: "image", widget: "image", required: false }
                      - { label: "Summary", name: "summary", widget: "markdown", required: false }
                      - { label: "Content (For detail pages)", name: "content", widget: "markdown", required: false }
                      - label: "Children (L4)"
                        name: "children"
                        widget: "list"
                        required: false
                        fields:
                          - { label: "Page ID (URL safe)", name: "id", widget: "string" }
                          - { label: "Title", name: "title", widget: "string" }
                          - { label: "Type", name: "type", widget: "select", options: ["list", "detail"], default: "list" }
                          - { label: "Icon", name: "icon", widget: "string", required: false }
                          - { label: "Image", name: "image", widget: "image", required: false }
                          - { label: "Summary", name: "summary", widget: "markdown", required: false }
                          - { label: "Content (For detail pages)", name: "content", widget: "markdown", required: false }
                          - label: "Children (L5)"
                            name: "children"
                            widget: "list"
                            required: false
                            fields:
                              - { label: "Page ID (URL safe)", name: "id", widget: "string" }
                              - { label: "Title", name: "title", widget: "string" }
                              - { label: "Type", name: "type", widget: "select", options: ["list", "detail"], default: "list" }
                              - { label: "Icon", name: "icon", widget: "string", required: false }
                              - { label: "Image", name: "image", widget: "image", required: false }
                              - { label: "Summary", name: "summary", widget: "markdown", required: false }
                              - { label: "Content (For detail pages)", name: "content", widget: "markdown", required: false }

          - label: "Footer Info"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Address", name: "address", widget: "string" }
              - { label: "Copyright", name: "copyright", widget: "string" }
